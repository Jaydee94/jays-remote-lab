name: Deploy via Ansible

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 85.215.129.251 >> ~/.ssh/known_hosts

      - name: Install Ansible and sshpass
        run: |
          pip install ansible
          sudo apt-get install -y sshpass

      - name: Run Ansible playbook
        run: |
          ansible-playbook site.yml \
            --extra-vars "ansible_password=${{ secrets.ANSIBLE_BECOME_PASS }} ansible_become_pass=${{ secrets.ANSIBLE_BECOME_PASS }}"
