---
- name: Manage Remote Lab VPS
  hosts: all
  become: true

  roles:
    - common      # apt update / upgrade + base dependencies
    - podman      # container runtime (apt)
    - nginx       # reverse proxy (apt)
    - starship    # shell prompt (GitHub release binary)
    - opencode    # AI coding assistant (GitHub release binary)
    - paperclip   # AI agent orchestration web app (npm package: paperclipai)
