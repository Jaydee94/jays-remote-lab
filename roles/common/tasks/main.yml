---
- name: Update apt package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 0

- name: Upgrade all packages to the latest version
  ansible.builtin.apt:
    upgrade: dist
    autoremove: true
    autoclean: true

- name: Install common system dependencies
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - unzip
      - tar
      - ca-certificates
      - gnupg
      - lsb-release
      - build-essential
    state: present

- name: Ensure ansible-versions directory exists
  ansible.builtin.file:
    path: "{{ ansible_version_dir }}"
    state: directory
    mode: "0755"
